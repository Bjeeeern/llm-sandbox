services:
  opencode:
    container_name: llm-sandbox-opencode
    build:
      context: .
      args:
        UID: ${HOST_UID:-1000}
        GID: ${HOST_GID:-1000}
    image: opencode-env
    depends_on:
      - openai-proxy
    environment:
      OPENCODE_CONFIG: /home/opencode/.config/opencode/opencode.json
      GIT_OPTIONAL_LOCKS: "0"
    command: ["sleep", "infinity"]
    volumes:
      - ${WORKSPACE:?Set WORKSPACE in .env}:/workspace
      - ${WORKSPACE:?Set WORKSPACE in .env}/.git:/workspace/.git:ro
      - ~/.config/opencode:/home/opencode/.config/opencode
      - ~/.local/share/opencode:/home/opencode/.local/share/opencode
    stdin_open: true
    tty: true

  openai-proxy:
    container_name: llm-sandbox-openai-proxy
    image: nginx:1.27-alpine
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:?Set OPENAI_API_KEY in .env}
    volumes:
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
